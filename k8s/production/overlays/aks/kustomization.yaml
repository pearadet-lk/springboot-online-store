apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - path: patch-ingress.yaml
  - path: patch-serviceaccount.yaml

images:
  - name: ghcr.io/your-org/online-store-gateway
    newName: <acr_name>.azurecr.io/online-store-gateway
    newTag: "1.0.0"
  - name: ghcr.io/your-org/online-store-order-service
    newName: <acr_name>.azurecr.io/online-store-order-service
    newTag: "1.0.0"
  - name: ghcr.io/your-org/online-store-payment-service
    newName: <acr_name>.azurecr.io/online-store-payment-service
    newTag: "1.0.0"
  - name: ghcr.io/your-org/online-store-product-service
    newName: <acr_name>.azurecr.io/online-store-product-service
    newTag: "1.0.0"
  - name: ghcr.io/your-org/online-store-cart-service
    newName: <acr_name>.azurecr.io/online-store-cart-service
    newTag: "1.0.0"
  - name: ghcr.io/your-org/online-store-user-service
    newName: <acr_name>.azurecr.io/online-store-user-service
    newTag: "1.0.0"
  - name: ghcr.io/your-org/online-store-inventory-service
    newName: <acr_name>.azurecr.io/online-store-inventory-service
    newTag: "1.0.0"
  - name: ghcr.io/your-org/online-store-shipping-service
    newName: <acr_name>.azurecr.io/online-store-shipping-service
    newTag: "1.0.0"
  - name: ghcr.io/your-org/online-store-history-service
    newName: <acr_name>.azurecr.io/online-store-history-service
    newTag: "1.0.0"
