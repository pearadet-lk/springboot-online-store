apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: online-store
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    rule_files:
      - /etc/prometheus/gateway-alerts.yml
    scrape_configs:
      - job_name: gateway
        static_configs:
          - targets: ["gateway:8080"]
        metrics_path: /metrics
      - job_name: order-service
        static_configs:
          - targets: ["order-service:8080"]
        metrics_path: /metrics
      - job_name: payment-service
        static_configs:
          - targets: ["payment-service:8080"]
        metrics_path: /metrics
      - job_name: product-service
        static_configs:
          - targets: ["product-service:8080"]
        metrics_path: /metrics
      - job_name: cart-service
        static_configs:
          - targets: ["cart-service:8080"]
        metrics_path: /metrics
      - job_name: user-service
        static_configs:
          - targets: ["user-service:8080"]
        metrics_path: /metrics
      - job_name: inventory-service
        static_configs:
          - targets: ["inventory-service:8080"]
        metrics_path: /metrics
      - job_name: shipping-service
        static_configs:
          - targets: ["shipping-service:8080"]
        metrics_path: /metrics
      - job_name: history-service
        static_configs:
          - targets: ["history-service:8080"]
        metrics_path: /metrics
  gateway-alerts.yml: |
    groups:
      - name: gateway-alerts
        rules:
          - alert: GatewayHigh5xxRate
            expr: sum(rate(http_requests_received_total{job="gateway",code=~"5.."}[5m])) > 0.5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Gateway 5xx rate is elevated"
              description: "Gateway returns more than 0.5 5xx responses/sec over 5 minutes."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: online-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.68.0
          ports:
            - containerPort: 16686
            - containerPort: 4317
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: online-store
spec:
  selector:
    app: jaeger
  ports:
    - name: ui
      port: 16686
      targetPort: 16686
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zipkin
  namespace: online-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zipkin
  template:
    metadata:
      labels:
        app: zipkin
    spec:
      containers:
        - name: zipkin
          image: openzipkin/zipkin:3.4
          ports:
            - containerPort: 9411
---
apiVersion: v1
kind: Service
metadata:
  name: zipkin
  namespace: online-store
spec:
  selector:
    app: zipkin
  ports:
    - name: http
      port: 9411
      targetPort: 9411
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: online-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v3.5.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: online-store
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: online-store
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false
---
