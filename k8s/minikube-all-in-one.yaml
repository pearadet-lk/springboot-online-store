apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: online-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: java-online-store/user-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: AUTH_JWT_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: gateway-config
                  key: AUTH_JWT_ISSUER
            - name: AUTH_JWT_AUDIENCE
              valueFrom:
                configMapKeyRef:
                  name: gateway-config
                  key: AUTH_JWT_AUDIENCE
            - name: AUTH_JWT_SIGNING_KEY
              valueFrom:
                configMapKeyRef:
                  name: gateway-config
                  key: AUTH_JWT_SIGNING_KEY
          envFrom:
            - configMapRef:
                name: java-services-config
            - configMapRef:
                name: observability-config
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: online-store
spec:
  selector:
    app: user-service
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: online-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: java-online-store/inventory-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
            - containerPort: 5213
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: GRPC_SERVER_PORT
              value: "5213"
          envFrom:
            - configMapRef:
                name: observability-config
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: online-store
spec:
  selector:
    app: inventory-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: grpc
      port: 5213
      targetPort: 5213
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: online-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: bitnamilegacy/kafka:3.8.1-debian-12-r0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9092
          env:
            - name: KAFKA_CFG_NODE_ID
              value: "1"
            - name: KAFKA_CFG_PROCESS_ROLES
              value: broker,controller
            - name: KAFKA_CFG_CONTROLLER_QUORUM_VOTERS
              value: 1@kafka:9093
            - name: KAFKA_CFG_LISTENERS
              value: PLAINTEXT://:9092,CONTROLLER://:9093
            - name: KAFKA_CFG_ADVERTISED_LISTENERS
              value: PLAINTEXT://kafka:9092
            - name: KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP
              value: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
            - name: KAFKA_CFG_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_KRAFT_CLUSTER_ID
              value: MkU3OEVBNTcwNTJENDM2Qk
            - name: ALLOW_PLAINTEXT_LISTENER
              value: "yes"
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: online-store
spec:
  selector:
    app: kafka
  ports:
    - port: 9092
      targetPort: 9092
