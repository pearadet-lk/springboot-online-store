apiVersion: v1
kind: Namespace
metadata:
  name: online-store
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: observability-config
  namespace: online-store
data:
  SERVER_PORT: "8080"
  Observability__OtlpEndpoint: http://jaeger:4317
  Observability__ZipkinEndpoint: http://zipkin:9411/api/v2/spans
  Observability__ElasticsearchUrl: http://elasticsearch:9200
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: java-services-config
  namespace: online-store
data:
  SPRING_PROFILES_ACTIVE: postgres
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/onlinestore
  SPRING_DATASOURCE_USERNAME: onlinestore
  SPRING_DATASOURCE_PASSWORD: onlinestore
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: online-store
data:
  SERVER_PORT: "8080"
  USER_SERVICE_URL: http://user-service:8080
  PRODUCT_SERVICE_URL: http://product-service:8080
  ORDER_SERVICE_URL: http://order-service:8080
  PAYMENT_SERVICE_URL: http://payment-service:8080
  CART_SERVICE_URL: http://cart-service:8080
  INVENTORY_SERVICE_URL: http://inventory-service:8080
  SHIPPING_SERVICE_URL: http://shipping-service:8080
  HISTORY_SERVICE_URL: http://history-service:8080
  EMAIL_SERVICE_URL: http://email-service:8080
  AUTH_JWT_ISSUER: online-store
  AUTH_JWT_AUDIENCE: online-store-clients
  AUTH_JWT_SIGNING_KEY: dev-super-secret-signing-key-min-32-chars
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: email-service-config
  namespace: online-store
data:
  SERVER_PORT: "8080"
  MESSAGING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  MESSAGING_KAFKA_GROUP_ID: email-service-group
  MESSAGING_KAFKA_TOPIC: email-notifications
  SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: online-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: java-online-store/gateway:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: gateway-config
            - configMapRef:
                name: observability-config
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: online-store
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: online-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: java-online-store/product-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SERVER_PORT
              value: "8080"
          envFrom:
            - configMapRef:
                name: java-services-config
            - configMapRef:
                name: observability-config
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: online-store
spec:
  selector:
    app: product-service
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: online-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: onlinestore
            - name: POSTGRES_USER
              value: onlinestore
            - name: POSTGRES_PASSWORD
              value: onlinestore
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: online-store
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
