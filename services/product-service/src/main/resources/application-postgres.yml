spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/onlinestore}
    username: ${SPRING_DATASOURCE_USERNAME:onlinestore}
    password: ${SPRING_DATASOURCE_PASSWORD:onlinestore}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: product_service
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    schemas: product_service
    default-schema: product_service
    locations: classpath:db/migration
