services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: onlinestore
      POSTGRES_PASSWORD: onlinestore
      POSTGRES_DB: onlinestore
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onlinestore -d onlinestore"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ./database/aurora-postgres-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: gateway
    environment:
      SERVER_PORT: 8080
      AUTH_JWT_ISSUER: online-store
      AUTH_JWT_AUDIENCE: online-store-clients
      AUTH_JWT_SIGNING_KEY: dev-super-secret-signing-key-min-32-chars
      USER_SERVICE_URL: http://user-service:8080
      PRODUCT_SERVICE_URL: http://product-service:8080
      ORDER_SERVICE_URL: http://order-service:8080
      PAYMENT_SERVICE_URL: http://payment-service:8080
      CART_SERVICE_URL: http://cart-service:8080
      INVENTORY_SERVICE_URL: http://inventory-service:8080
      SHIPPING_SERVICE_URL: http://shipping-service:8080
      HISTORY_SERVICE_URL: http://history-service:8080
      EMAIL_SERVICE_URL: http://email-service:8080
    ports:
      - "8081:8080"
    depends_on:
      - user-service
      - product-service
      - cart-service
      - order-service
      - payment-service
      - inventory-service
      - shipping-service
      - history-service
      - email-service

  product-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: product-service
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/onlinestore
      SPRING_DATASOURCE_USERNAME: onlinestore
      SPRING_DATASOURCE_PASSWORD: onlinestore
    ports:
      - "8084:8080"
    depends_on:
      postgres:
        condition: service_healthy

  cart-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: cart-service
    environment:
      SERVER_PORT: 8080
    ports:
      - "8085:8080"

  order-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: order-service
    environment:
      SERVER_PORT: 8080
    ports:
      - "8082:8080"

  payment-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: payment-service
    environment:
      SERVER_PORT: 8080
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
    ports:
      - "8083:8080"

  user-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: user-service
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/onlinestore
      SPRING_DATASOURCE_USERNAME: onlinestore
      SPRING_DATASOURCE_PASSWORD: onlinestore
      AUTH_JWT_ISSUER: online-store
      AUTH_JWT_AUDIENCE: online-store-clients
      AUTH_JWT_SIGNING_KEY: dev-super-secret-signing-key-min-32-chars
    ports:
      - "8086:8080"
    depends_on:
      postgres:
        condition: service_healthy

  inventory-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: inventory-service
    environment:
      SERVER_PORT: 8080
    ports:
      - "8087:8080"

  shipping-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: shipping-service
    environment:
      SERVER_PORT: 8080
    ports:
      - "8088:8080"

  history-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: history-service
    environment:
      SERVER_PORT: 8080
    ports:
      - "8089:8080"

  email-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: email-service
    environment:
      SERVER_PORT: 8080
      MESSAGING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MESSAGING_KAFKA_GROUP_ID: email-service-group
    ports:
      - "8090:8080"
    depends_on:
      kafka:
        condition: service_started

  kafka:
    image: bitnamilegacy/kafka:3.8.1-debian-12-r0
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_KRAFT_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9092:9092"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  jaeger:
    image: jaegertracing/all-in-one:1.59
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"

  zipkin:
    image: openzipkin/zipkin:3.4
    ports:
      - "9411:9411"

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/gateway-alerts.yml:/etc/prometheus/gateway-alerts.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      gateway:
        condition: service_started

  grafana:
    image: grafana/grafana:11.2.2
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_started

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
